<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <meta name="referrer" content="no-referrer">
  <title>Sphere Football – Booking Action</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #07162c; font-family: Arial, Helvetica, sans-serif; color: #111827; min-height: 100vh; padding: 24px 16px; }
    main { max-width: 520px; margin: 0 auto; }
    .card { background: #fff; border-radius: 18px; padding: 28px 22px; box-shadow: 0 18px 45px rgba(0,0,0,.24); }
    h1 { color: #07162c; font-size: 22px; line-height: 1.2; margin-bottom: 14px; }
    .summary { border: 1px solid #d8eafb; border-radius: 14px; overflow: hidden; margin: 16px 0; }
    .summary-row { display: flex; border-bottom: 1px solid #edf3fb; }
    .summary-row:last-child { border-bottom: 0; }
    .summary-label { width: 38%; padding: 10px 12px; color: #1a75d2; font-size: 13px; font-weight: 900; }
    .summary-value { flex: 1; padding: 10px 12px; font-size: 14px; line-height: 1.4; }
    .warning { margin: 16px 0; padding: 14px 16px; border-radius: 12px; background: #fff7ed; color: #9a3412; font-size: 14px; line-height: 1.5; }
    .disabled-msg { margin: 16px 0; padding: 14px 16px; border-radius: 12px; background: #f3f4f6; color: #374151; font-size: 14px; line-height: 1.5; }
    .field-label { display: block; margin: 18px 0 8px; color: #07162c; font-size: 14px; font-weight: 900; }
    .textarea { width: 100%; border: 1px solid #d8eafb; border-radius: 12px; padding: 12px 14px; color: #111827; font: 15px/1.5 Arial, Helvetica, sans-serif; resize: vertical; }
    input.textarea { resize: none; height: auto; }
    .field-help { margin-top: 8px; color: #6b7280; font-size: 13px; line-height: 1.4; }
    .btn { display: block; width: 100%; border: 0; border-radius: 999px; font-size: 16px; font-weight: 900; padding: 15px 18px; cursor: pointer; margin-top: 20px; transition: opacity .15s; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-primary { background: #1a75d2; color: #fff; }
    .btn-danger { background: #fff; color: #dc2626; border: 2px solid #dc2626; }
    .result { margin-top: 16px; padding: 16px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
    .result-success { background: #ecfdf5; color: #065f46; }
    .result-error { background: #fef2f2; color: #991b1b; }
    .loading { color: #6b7280; font-size: 14px; padding: 20px 0; text-align: center; }
    .sphere-footer { text-align: center; margin-top: 18px; font-size: 13px; color: #6b8cae; }
    .sphere-footer a { color: #a7f432; text-decoration: none; }
  </style>
</head>
<body>
  <main>
    <section class="card" id="card">
      <div class="loading" id="loading">Loading booking details&hellip;</div>
    </section>
    <div class="sphere-footer">Sphere Football Academy</div>
  </main>
  <script>
    (function() {
      'use strict';

      var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw94GWvDepMDZ_xKAIMwTSbEbdfe0f8aoyT7fi4vcS4FXoqinK_Kc0uKaafSYS0K8-p/exec';

      var params = new URLSearchParams(window.location.search);
      var action = params.get('action') || '';
      var booking = params.get('booking') || '';
      var token = params.get('token') || '';

      window.history.replaceState(null, '', window.location.pathname);

      var card = document.getElementById('card');

      if (!action || !booking || !token) {
        renderError('This booking link is missing required details.');
        return;
      }

      fetchBookingDetails();

      function fetchBookingDetails() {
        var url = APPS_SCRIPT_URL +
          '?format=json&action=' + encodeURIComponent(action) +
          '&booking=' + encodeURIComponent(booking) +
          '&token=' + encodeURIComponent(token);

        fetch(url, { method: 'GET', redirect: 'follow' })
          .then(function(response) {
            if (!response.ok) throw new Error('Server returned ' + response.status);
            return response.json();
          })
          .then(function(data) {
            if (!data.found) {
              renderError('This booking link is not recognised. It may have been copied incorrectly.');
              return;
            }
            renderConfirmation(data);
          })
          .catch(function() {
            renderError('Could not load booking details. Check your connection and try again.');
          });
      }

      function performAction() {
        var btn = document.getElementById('confirm-btn');
        var cancellationReason = '';
        var newPartyDate = '';
        var newPartyTime = '';
        var changeReason = '';

        if (action === 'cancel') {
          var reasonField = document.getElementById('cancellation-reason');
          cancellationReason = reasonField ? reasonField.value.trim() : '';
          if (!cancellationReason) {
            renderInlineError('Please provide a message explaining why the enquiry is being cancelled.');
            if (reasonField) reasonField.focus();
            return;
          }
        }

        if (action === 'change-date') {
          var dateField = document.getElementById('new-party-date');
          var timeField = document.getElementById('new-party-time');
          var changeReasonField = document.getElementById('change-reason');
          newPartyDate = dateField ? dateField.value.trim() : '';
          newPartyTime = timeField ? timeField.value.trim() : '';
          changeReason = changeReasonField ? changeReasonField.value.trim() : '';

          if (!newPartyDate) {
            renderInlineError('Please select a new party date.');
            if (dateField) dateField.focus();
            return;
          }
          if (!newPartyTime) {
            renderInlineError('Please select a new party time.');
            if (timeField) timeField.focus();
            return;
          }
        }

        if (btn) {
          btn.disabled = true;
          btn.textContent = 'Processing\u2026';
        }

        var url = APPS_SCRIPT_URL +
          '?format=json&action=' + encodeURIComponent(action) +
          '&booking=' + encodeURIComponent(booking) +
          '&token=' + encodeURIComponent(token) +
          '&cancellationReason=' + encodeURIComponent(cancellationReason) +
          '&newPartyDate=' + encodeURIComponent(newPartyDate) +
          '&newPartyTime=' + encodeURIComponent(newPartyTime) +
          '&changeReason=' + encodeURIComponent(changeReason);

        fetch(url, { method: 'POST', redirect: 'follow' })
          .then(function(response) {
            if (!response.ok) throw new Error('Server returned ' + response.status);
            return response.json();
          })
          .then(function(data) {
            if (data.success) {
              renderResult(data.title || 'Done', data.message, true);
            } else {
              renderResult('Action failed', data.message || 'Something went wrong.', false);
            }
          })
          .catch(function() {
            renderResult('Connection error', 'Could not reach the server. Check your connection and try again.', false);
            if (btn) {
              btn.disabled = false;
              btn.textContent = actionLabel(action);
            }
          });
      }

      function renderConfirmation(data) {
        var b = data.booking;
        var act = data.action;
        var html = '<h1>' + esc(act.label) + '</h1>';
        html += '<p style="color:#4b5563;font-size:14px;margin-bottom:14px;">Review the booking below. Nothing changes until you press the button.</p>';
        html += buildSummary(b);

        if (!act.allowed) {
          html += '<div class="disabled-msg">This action is not available while the booking status is <strong>' + esc(b.status || 'UNKNOWN') + '</strong>.</div>';
        } else {
          if (act.warning) {
            html += '<div class="warning">' + esc(act.warning) + '</div>';
          }
          if (action === 'cancel') {
            html += '<label class="field-label" for="cancellation-reason">Message to the parent</label>';
            html += '<textarea class="textarea" id="cancellation-reason" maxlength="1000" rows="5" placeholder="Example: Sorry, this date is unavailable due to an existing booking."></textarea>';
            html += '<p class="field-help">This message will be included in the cancellation email.</p>';
          }
          if (action === 'change-date') {
            html += '<label class="field-label" for="new-party-date">New Party Date</label>';
            html += '<input type="date" class="textarea" id="new-party-date" value="' + esc(b.partyDate || '') + '" required>';
            html += '<label class="field-label" for="new-party-time">New Party Time</label>';
            html += '<input type="time" class="textarea" id="new-party-time" value="' + esc(b.partyTime || '') + '" required>';
            html += '<label class="field-label" for="change-reason">Message to the parent <span style="font-weight:400;color:#6b7280;">(optional)</span></label>';
            html += '<textarea class="textarea" id="change-reason" maxlength="1000" rows="4" placeholder="Example: We\'ve moved your party to accommodate a scheduling change at the facility."></textarea>';
            html += '<p class="field-help">If provided, this message will be included in the email to the parent.</p>';
          }
          html += '<div id="inline-error"></div>';
          var btnClass = action === 'cancel' ? 'btn btn-danger' : 'btn btn-primary';
          html += '<button type="button" class="' + btnClass + '" id="confirm-btn">' + esc(act.label) + '</button>';
        }

        card.innerHTML = html;

        var btn = document.getElementById('confirm-btn');
        if (btn) {
          btn.addEventListener('click', performAction);
        }
      }

      function renderResult(title, message, success) {
        var cls = success ? 'result-success' : 'result-error';
        card.innerHTML = '<h1>' + esc(title) + '</h1>' +
          '<div class="result ' + cls + '">' + esc(message) + '</div>';
      }

      function renderError(message) {
        card.innerHTML = '<h1>Booking Action</h1>' +
          '<div class="result result-error">' + esc(message) + '</div>';
      }

      function renderInlineError(message) {
        var target = document.getElementById('inline-error');
        if (target) {
          target.innerHTML = '<div class="result result-error">' + esc(message) + '</div>';
        }
      }

      function buildSummary(b) {
        var rows = [
          ['Parent', b.parentName],
          ['Phone', b.phone],
          ['Email', b.email],
          ['Child', b.childName + ' (age ' + b.childAge + ')'],
          ['Party Date', formatDisplayDate(b.partyDate)],
          ['Party Time', b.partyTime],
          ['Guests', b.guestCount],
          ['Package', b.package],
          ['Status', b.status]
        ];

        var html = '<div class="summary">';
        for (var i = 0; i < rows.length; i++) {
          html += '<div class="summary-row">' +
            '<div class="summary-label">' + esc(rows[i][0]) + '</div>' +
            '<div class="summary-value">' + esc(rows[i][1] || '') + '</div>' +
            '</div>';
        }
        html += '</div>';
        return html;
      }

      function actionLabel(a) {
        if (a === 'request-deposit') return 'Request Deposit';
        if (a === 'mark-deposit-paid') return 'Mark Deposit Paid';
        if (a === 'change-date') return 'Change Party Date';
        if (a === 'cancel') return 'Cancel Enquiry';
        return 'Confirm';
      }

      function formatDisplayDate(value) {
        var match = String(value || '').match(/^(\d{4})-(\d{2})-(\d{2})$/);
        return match ? match[3] + '-' + match[2] + '-' + match[1] : value;
      }

      function esc(str) {
        var d = document.createElement('div');
        d.appendChild(document.createTextNode(str));
        return d.innerHTML;
      }
    })();
  </script>
</body>
</html>
