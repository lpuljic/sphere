<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <meta name="referrer" content="no-referrer">
  <title>Sphere Football – Shop Action</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #07162c; font-family: Arial, Helvetica, sans-serif; color: #111827; min-height: 100vh; padding: 24px 16px; }
    main { max-width: 520px; margin: 0 auto; }
    .card { background: #fff; border-radius: 18px; padding: 28px 22px; box-shadow: 0 18px 45px rgba(0,0,0,.24); }
    h1 { color: #07162c; font-size: 22px; line-height: 1.2; margin-bottom: 14px; }
    .summary { border: 1px solid #d8eafb; border-radius: 14px; overflow: hidden; margin: 16px 0; }
    .summary-row { display: flex; border-bottom: 1px solid #edf3fb; }
    .summary-row:last-child { border-bottom: 0; }
    .summary-label { width: 38%; padding: 10px 12px; color: #1a75d2; font-size: 13px; font-weight: 900; }
    .summary-value { flex: 1; padding: 10px 12px; font-size: 14px; line-height: 1.4; }
    .warning { margin: 16px 0; padding: 14px 16px; border-radius: 12px; background: #fff7ed; color: #9a3412; font-size: 14px; line-height: 1.5; }
    .disabled-msg { margin: 16px 0; padding: 14px 16px; border-radius: 12px; background: #f3f4f6; color: #374151; font-size: 14px; line-height: 1.5; }
    .btn { display: block; width: 100%; border: 0; border-radius: 999px; background: #1a75d2; color: #fff; font-size: 16px; font-weight: 900; padding: 15px 18px; cursor: pointer; margin-top: 20px; transition: opacity .15s; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .result { margin-top: 16px; padding: 16px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
    .result-success { background: #ecfdf5; color: #065f46; }
    .result-error { background: #fef2f2; color: #991b1b; }
    .loading { color: #6b7280; font-size: 14px; padding: 20px 0; text-align: center; }
    .sphere-footer { text-align: center; margin-top: 18px; font-size: 13px; color: #6b8cae; }
  </style>
</head>
<body>
  <main>
    <section class="card" id="card">
      <div class="loading" id="loading">Loading order details&hellip;</div>
    </section>
    <div class="sphere-footer">Sphere Football Academy</div>
  </main>
  <script>
    (function() {
      'use strict';

      var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxlCzPb4RmG5gtztQBbnixI80wvDpA2WBN-zELFApM4_l7tTp7e8cDNeSxF1lpBi9T6/exec';

      var params = new URLSearchParams(window.location.search);
      var action = params.get('action') || '';
      var orderId = params.get('orderId') || '';
      var token = params.get('token') || '';

      window.history.replaceState(null, '', window.location.pathname);

      var card = document.getElementById('card');

      if (!action || !orderId || !token) {
        renderError('This shop order link is missing required details.');
        return;
      }

      fetchOrderDetails();

      function fetchOrderDetails() {
        var url = actionUrl();

        fetch(url, { method: 'GET', redirect: 'follow' })
          .then(readJsonResponse)
          .then(function(data) {
            if (!data.found) {
              renderError(data.message || 'This shop order link is not recognised.');
              return;
            }
            renderConfirmation(data);
          })
          .catch(function(error) {
            renderError(error.message || 'Could not load order details. Check your connection and try again.');
          });
      }

      function performAction() {
        var btn = document.getElementById('confirm-btn');
        if (btn) {
          btn.disabled = true;
          btn.textContent = 'Processing\u2026';
        }

        fetch(actionUrl(), { method: 'POST', redirect: 'follow' })
          .then(readJsonResponse)
          .then(function(data) {
            if (data.success) {
              renderResult(data.title || 'Done', data.message, true);
            } else {
              renderResult('Action failed', data.message || 'Something went wrong.', false);
              if (btn) {
                btn.disabled = false;
                btn.textContent = btn.getAttribute('data-label') || 'Try Again';
              }
            }
          })
          .catch(function(error) {
            renderResult('Connection error', error.message || 'Could not reach the server. Check your connection and try again.', false);
            if (btn) {
              btn.disabled = false;
              btn.textContent = btn.getAttribute('data-label') || 'Try Again';
            }
          });
      }

      function actionUrl() {
        return APPS_SCRIPT_URL +
          '?format=json&action=' + encodeURIComponent(action) +
          '&orderId=' + encodeURIComponent(orderId) +
          '&token=' + encodeURIComponent(token);
      }

      function readJsonResponse(response) {
        return response.text().then(function(text) {
          if (!response.ok) throw new Error('Server returned ' + response.status + '.');

          try {
            return JSON.parse(text);
          } catch (error) {
            var hint = text.indexOf('Script function not found: doGet') !== -1
              ? 'Apps Script has not been redeployed with the shop action code yet.'
              : 'Apps Script returned HTML instead of JSON.';
            throw new Error(hint);
          }
        });
      }

      function renderConfirmation(data) {
        var order = data.order;
        var act = data.action;
        var html = '<h1>' + esc(act.label) + '</h1>';
        html += '<p style="color:#4b5563;font-size:14px;margin-bottom:14px;">Review the order below. Nothing changes until you press the button.</p>';
        html += buildSummary(order);

        if (!act.allowed) {
          html += '<div class="disabled-msg">' + esc(act.warning || 'This action is not available for this order.') + '</div>';
        } else {
          if (act.warning) {
            html += '<div class="warning">' + esc(act.warning) + '</div>';
          }
          html += '<button type="button" class="btn" id="confirm-btn" data-label="' + esc(act.label) + '">' + esc(act.label) + '</button>';
        }

        card.innerHTML = html;

        var btn = document.getElementById('confirm-btn');
        if (btn) {
          btn.addEventListener('click', performAction);
        }
      }

      function buildSummary(order) {
        var rows = [
          ['Order', '#' + order.orderId],
          ['Customer', order.customerName],
          ['Email', order.customerEmail],
          ['Total', '$' + order.total + ' AUD']
        ];

        if (order.items && order.items.length) {
          rows.push(['Items', order.items.map(function(item) {
            return item.name + ' / ' + (item.size || '-') + ' / qty ' + item.units + ' / $' + item.lineTotal;
          }).join('\n')]);
        }

        if (order.paymentReceivedAt) {
          rows.push(['Paid At', order.paymentReceivedAt]);
        }

        if (order.paymentReminderSentAt) {
          rows.push(['Last Reminder', order.paymentReminderSentAt]);
        }

        var html = '<div class="summary">';
        for (var i = 0; i < rows.length; i++) {
          html += '<div class="summary-row">' +
            '<div class="summary-label">' + esc(rows[i][0]) + '</div>' +
            '<div class="summary-value">' + esc(rows[i][1] || '').replace(/\n/g, '<br>') + '</div>' +
            '</div>';
        }
        html += '</div>';
        return html;
      }

      function renderResult(title, message, success) {
        var cls = success ? 'result-success' : 'result-error';
        card.innerHTML = '<h1>' + esc(title) + '</h1>' +
          '<div class="result ' + cls + '">' + esc(message || '') + '</div>';
      }

      function renderError(message) {
        card.innerHTML = '<h1>Shop Action</h1>' +
          '<div class="result result-error">' + esc(message) + '</div>';
      }

      function esc(str) {
        var d = document.createElement('div');
        d.appendChild(document.createTextNode(str));
        return d.innerHTML;
      }
    })();
  </script>
</body>
</html>
